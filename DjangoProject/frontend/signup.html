<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
     <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Реєстрація</title>
    <link rel="stylesheet" href="/static/signup.css">
    <link href="https://fonts.googleapis.com/css2?family=Karantina:wght@300;400;700&display=swap" rel="stylesheet">
</head>
<body>

<header>
    <div class="logo">NutFit</div>
    <nav>
        <a href="/profile/" class="menu-link">Головна</a>
        <a href="/login/" class="menu-link">Увійти / Реєстрація</a>
        <a href="/profile/" class="menu-link">Особистий кабінет</a>
        <a href="/pages/exercise/" class="menu-link">Тренування</a>
        <a href="/notifications/" class="menu-link">Сповіщення</a>
    </nav>
</header>

<main>
    <h2>ЗАРЕЄСТРУВАТИСЬ</h2>

    <form class="login-form" id="signup-form">
        <label>USERNAME</label>
        <input type="text" id="username" placeholder="Введіть username" required>

        <label>ЕЛЕКТРОННА АДРЕСА</label>
        <input type="email" id="email" placeholder="Введіть електронну адресу" required>

        <label>ПАРОЛЬ</label>
        <div class="password-box">
            <input type="password" id="password" placeholder="Введіть пароль" required>
            <span class="eye" onclick="togglePassword()">👁</span>
        </div>

        <div id="error-messages" style="color: red; margin-bottom: 10px;"></div>

        <button type="submit" class="login" id="submit-btn">Зареєструватися</button>

        <hr class="divider">

        <p>Маю акаунт</p>
        <button type="button" class="register" id="login-btn">Увійти</button>
    </form>
</main>

<script src="/static/signup.js"></script>
</body>
</html>
