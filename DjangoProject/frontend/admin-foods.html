<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Керування базою | NutFit</title>
    <link href="https://fonts.googleapis.com/css2?family=Karantina:wght@300;400;700&display=swap" rel="stylesheet">
    <style>
        body { margin: 0; font-family: 'Segoe UI', sans-serif; background: #f5f0e6; }
        header { display: flex; justify-content: space-between; align-items: center; padding: 20px 60px; background: #fff; box-shadow: 0 2px 5px rgba(0,0,0,0.1); }
        .logo { font-family: 'Karantina', sans-serif; font-size: 42px; color: #0097C1; font-weight: bold; }
        .container { width: 95%; max-width: 1100px; margin: 40px auto; }
        .tabs { display: flex; gap: 6px; }
        .tab-btn { padding: 12px 35px; background: #d1ccc0; border: none; cursor: pointer; font-family: 'Karantina', sans-serif; font-size: 24px; border-radius: 12px 12px 0 0; color: #555; }
        .tab-btn.active { background: #fff; color: #0097C1; }
        .admin-panel { background: #fff; padding: 35px; border-radius: 0 12px 12px 12px; box-shadow: 0 4px 20px rgba(0,0,0,0.08); margin-top: -1px; }
        .topline { display: flex; justify-content: space-between; align-items: center; margin-bottom: 16px; }
        .back { text-decoration: none; color: #0097C1; font-weight: 600; }
        .form-group { display: flex; gap: 15px; margin-bottom: 35px; padding: 20px; background: #f9f9f9; border-radius: 8px; }
        input { flex: 2; padding: 12px; border: 1px solid #ddd; border-radius: 6px; font-size: 16px; }
        input[type="number"] { flex: 1; }
        .add-btn { background: #0097C1; color: #fff; border: none; padding: 0 40px; border-radius: 6px; cursor: pointer; font-family: 'Karantina', sans-serif; font-size: 22px; }
        table { width: 100%; border-collapse: collapse; }
        th, td { padding: 18px; text-align: left; border-bottom: 1px solid #eee; }
        th { background: #9fc7d6; font-size: 13px; text-transform: uppercase; }
        .delete-btn { color: #e74c3c; border: 1px solid #e74c3c; background: none; padding: 6px 12px; cursor: pointer; border-radius: 4px; font-size: 13px; }
        .error { margin-top: 12px; color: #b00020; }
        @media (max-width: 768px) {
            header {flex-direction: column; align-items: flex-start;padding: 20px; gap: 10px; }
            .container { width: 100%;margin: 20px auto; padding: 0 15px;}
            .form-group { flex-direction: column; }
            .add-btn { width: 100%; padding: 12px; }
            .tabs { flex-direction: column; }
            .tab-btn { width: 100%; border-radius: 12px; }
            .admin-panel { padding: 20px; border-radius: 12px; }
            table {min-width: 650px;}
            .table-wrapper, .admin-panel {overflow-x: auto;}
            .chart-container {overflow-x: auto;}
            .bar-chart {min-width: 500px;}
        }
    </style>
</head>
<body>

<header>
    <div class="logo">NutFit</div>
    <div style="font-family: 'Karantina'; font-size: 24px; color: #666;">ADMIN / DATABASE MANAGER</div>
</header>

<div class="container">
    <div class="tabs">
        <button id="btn-foods" class="tab-btn active" type="button">СТРАВИ</button>
        <button id="btn-workouts" class="tab-btn" type="button">ТРЕНУВАННЯ</button>
    </div>

    <div class="admin-panel">
        <div class="topline">
            <h2 id="view-title" style="font-family: 'Karantina'; font-size: 32px; margin: 0;">Керування стравами</h2>
            <a class="back" href="/admin-panel/">← Назад</a>
        </div>

        <div class="form-group">
            <input type="text" id="itemName" placeholder="Назва">
            <input type="number" id="itemValue" placeholder="Калорії (ккал)">
            <button class="add-btn" type="button" id="addBtn">ДОДАТИ</button>
        </div>

        <table>
            <thead>
            <tr>
                <th style="width: 80px;">ID</th>
                <th>Назва</th>
                <th id="col-value">Кал/порція</th>
                <th style="width: 120px; text-align: center;">Дія</th>
            </tr>
            </thead>
            <tbody id="mainTableBody"></tbody>
        </table>
        <div class="error" id="errorBox"></div>
    </div>
</div>

<script>
const API_BASE =
    window.location.origin === "http://127.0.0.1:8000" || window.location.origin === "http://localhost:8000"
        ? ""
        : "http://127.0.0.1:8000";

const ENDPOINTS = {
    foods: "/api/admin/foods/",
    workouts: "/api/admin/workouts/",
};

let currentTab = "foods";

function getCookieValue(name) {
    const cookies = document.cookie ? document.cookie.split(";") : [];
    for (const cookie of cookies) {
        const trimmed = cookie.trim();
        if (trimmed.startsWith(`${name}=`)) {
            return decodeURIComponent(trimmed.substring(name.length + 1));
        }
    }
    return "";
}

function setError(message) {
    const box = document.getElementById("errorBox");
    if (box) box.textContent = message || "";
}

async function apiGet() {
    const response = await fetch(`${API_BASE}${ENDPOINTS[currentTab]}`, { credentials: "include" });
    if (!response.ok) throw new Error(`HTTP ${response.status}`);
    return response.json();
}

async function apiAdd(item) {
    const csrfToken = getCookieValue("csrftoken");
    const response = await fetch(`${API_BASE}${ENDPOINTS[currentTab]}`, {
        method: "POST",
        credentials: "include",
        headers: {
            "Content-Type": "application/json",
            ...(csrfToken ? { "X-CSRFToken": csrfToken } : {}),
        },
        body: JSON.stringify(item),
    });
    if (!response.ok) throw new Error(`HTTP ${response.status}`);
    return response.json();
}

async function apiDelete(id) {
    const csrfToken = getCookieValue("csrftoken");
    const response = await fetch(`${API_BASE}${ENDPOINTS[currentTab]}${id}/`, {
        method: "DELETE",
        credentials: "include",
        headers: csrfToken ? { "X-CSRFToken": csrfToken } : {},
    });
    if (!response.ok) throw new Error(`HTTP ${response.status}`);
    return response.json();
}

function applyTabUi() {
    const isFoods = currentTab === "foods";
    document.getElementById("btn-foods").classList.toggle("active", isFoods);
    document.getElementById("btn-workouts").classList.toggle("active", !isFoods);
    document.getElementById("view-title").innerText = isFoods ? "Керування стравами" : "Керування тренуваннями";
    document.getElementById("itemValue").placeholder = isFoods ? "Калорії (ккал)" : "Тривалість (хв)";
    document.getElementById("col-value").innerText = isFoods ? "Кал/порція" : "Час (хв)";
}

function renderRows(items) {
    const body = document.getElementById("mainTableBody");
    body.innerHTML = "";

    items.forEach((item) => {
        const unit = currentTab === "foods" ? "ккал" : "хв";
        const row = document.createElement("tr");
        row.innerHTML = `
            <td>#${item.id}</td>
            <td><strong>${item.name}</strong></td>
            <td>${item.val} ${unit}</td>
            <td style="text-align: center;">
                <button class="delete-btn" data-id="${item.id}">Видалити</button>
            </td>
        `;
        body.appendChild(row);
    });

    body.querySelectorAll("button.delete-btn").forEach((btn) => {
        btn.addEventListener("click", async () => {
            const id = Number(btn.dataset.id);
            if (!confirm("Видалити цей запис?")) return;
            try {
                setError("");
                await apiDelete(id);
                await refresh();
            } catch (error) {
                setError("Не вдалося видалити запис.");
            }
        });
    });
}

async function refresh() {
    try {
        setError("");
        applyTabUi();
        const data = await apiGet();
        renderRows(data.results || []);
    } catch (error) {
        setError("Не вдалося завантажити дані.");
    }
}

async function handleAdd() {
    const nameEl = document.getElementById("itemName");
    const valueEl = document.getElementById("itemValue");
    const name = nameEl.value.trim();
    const val = Number(valueEl.value);

    if (!name || !Number.isFinite(val)) {
        setError("Заповніть коректно назву і числове значення.");
        return;
    }

    try {
        setError("");
        await apiAdd({ name, val });
        nameEl.value = "";
        valueEl.value = "";
        await refresh();
    } catch (error) {
        setError("Не вдалося додати запис.");
    }
}

document.getElementById("btn-foods").addEventListener("click", async () => {
    currentTab = "foods";
    await refresh();
});

document.getElementById("btn-workouts").addEventListener("click", async () => {
    currentTab = "workouts";
    await refresh();
});

document.getElementById("addBtn").addEventListener("click", handleAdd);
document.addEventListener("DOMContentLoaded", refresh);
</script>

</body>
</html>
