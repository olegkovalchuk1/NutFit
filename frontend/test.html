<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <title>Тест</title>
    <link rel="stylesheet" href="test.css">
    <link href="https://fonts.googleapis.com/css2?family=Karantina:wght@300;400;700&display=swap" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Jost:wght@300;400;500;600;700&display=swap" rel="stylesheet">
</head>
<body>

<header class="header">
    <div class="logo">NutFit</div>
    <nav>
        <a href="#">ГОЛОВНА</a>
        <a href="#">УВІЙТИ/ЗАРЕЄСТРУВАТИСЬ</a>
        <a href="#" class="active">ОСОБИСТИЙ КАБІНЕТ</a>
        <a href="#">СПОВІЩЕННЯ</a>
    </nav>
</header>

<div class="container">

    <div class="left">
        <h1>TECT</h1>

        <form>
            <div class="question"> <!-- ПИТАННЯ 1 -->
                <p>Який ваш рівень активності?</p>
                <label><input type="radio" name="q1"> Низький</label>
                <label><input type="radio" name="q1"> Помірний</label>
                <label><input type="radio" name="q1"> Середній</label>
                <label><input type="radio" name="q1"> Високий</label>
            </div>

            <div class="question"> <!-- ПИТАННЯ 2 -->
                <p>Яка ваша мета?</p>
                <label><input type="radio" name="q2"> Схуднути</label>
                <label><input type="radio" name="q2"> Підтримувати вагу</label>
                <label><input type="radio" name="q2"> Збільшити м’язову масу</label>
            </div>

            <p class="p1">ВВЕДІТЬ ВАШІ ДАНІ</p>
            <div class="data-inputs">
                <input type="text" placeholder="Вік">
                <input type="text" placeholder="Зріст">
                <input type="text" placeholder="Вага">
            </div>

            <div class="gender-inputs"> 
                <p>Оберіть вашу стать:</p>
                <label><input type="radio" name="gender"> Жіноча</label>
                <label><input type="radio" name="gender"> Чоловіча</label>
            </div>

            <button class="btn">ЗАВЕРШИТИ ТЕСТ</button>
        </form>
    </div>

    <!-- ПРАВА ЧАСТИНА -->
    <div class="right">
        <img src="images/N.jpg" class="letter n">
        <img src="images/F.jpg" class="letter f">
    </div>

</div>

</body>
</html>
