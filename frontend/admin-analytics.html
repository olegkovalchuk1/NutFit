<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Системна аналітика | NutFit</title>
    <link href="https://fonts.googleapis.com/css2?family=Karantina:wght@300;400;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-color: #f5f0e6;
            --accent-blue: #0097C1;
            --white: #ffffff;
            --text-main: #333;
        }

        body {
            margin: 0;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: var(--bg-color);
            color: var(--text-main);
        }

        header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 20px 60px;
            background: var(--white);
            box-shadow: 0 2px 5px rgba(0,0,0,0.1);
        }

        .logo {
            font-family: 'Karantina', sans-serif;
            font-size: 42px;
            color: var(--accent-blue);
            font-weight: bold;
            letter-spacing: 2px;
        }

        .container {
            width: 90%;
            max-width: 1100px;
            margin: 40px auto;
        }

        h2 {
            font-family: 'Karantina', sans-serif;
            font-size: 32px;
            letter-spacing: 1px;
            border-left: 5px solid var(--accent-blue);
            padding-left: 15px;
            margin-bottom: 30px;
            text-transform: uppercase;
        }

        .stats-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(240px, 1fr));
            gap: 20px;
            margin-bottom: 40px;
        }

        .stat-card {
            background: var(--white);
            padding: 25px;
            border-radius: 12px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.05);
            text-align: center;
            transition: transform 0.3s;
        }

        .stat-card:hover { transform: translateY(-5px); }

        .stat-value {
            font-family: 'Karantina', sans-serif;
            font-size: 48px;
            color: var(--accent-blue);
            margin: 10px 0;
        }

        .stat-label {
            font-size: 14px;
            color: #777;
            text-transform: uppercase;
            font-weight: bold;
        }

        .chart-container {
            background: var(--white);
            padding: 30px;
            border-radius: 12px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.05);
        }

        .chart-title {
            font-family: 'Karantina', sans-serif;
            font-size: 24px;
            margin-bottom: 20px;
            display: flex;
            justify-content: space-between;
        }

        .bar-chart {
            display: flex;
            align-items: flex-end;
            justify-content: space-around;
            height: 200px;
            padding-top: 20px;
            border-bottom: 2px solid #ddd;
        }

        .bar {
            width: 40px;
            background: var(--accent-blue);
            border-radius: 4px 4px 0 0;
            position: relative;
            transition: height 1s ease-in-out;
        }

        .bar::after {
            content: attr(data-label);
            position: absolute;
            bottom: -25px;
            left: 50%;
            transform: translateX(-50%);
            font-size: 12px;
            white-space: nowrap;
        }

        .bar:hover { opacity: 0.8; }
    </style>
</head>
<body>

<header>
    <div class="logo">NutFit</div>
    <div style="font-size: 14px; color: #666;">Admin Panel / Analytics</div>
</header>

<div class="container">
    <h2>Системна аналітика</h2>

    <div class="stats-grid">
        <div class="stat-card">
            <div class="stat-label">Користувачів</div>
            <div class="stat-value" id="userCount">...</div>
        </div>
        <div class="stat-card">
            <div class="stat-label">Страв у базі</div>
            <div class="stat-value" id="foodCount">...</div>
        </div>
        <div class="stat-card">
            <div class="stat-label">Тренувань</div>
            <div class="stat-value" id="workoutCount">0</div>
        </div>
        <div class="stat-card">
            <div class="stat-label">Активність (%)</div>
            <div class="stat-value" id="activityRate">0%</div>
        </div>
    </div>

    <div class="chart-container">
        <div class="chart-title">
            Відвідуваність (останні 7 днів)
            <span style="color: #27ae60; font-size: 16px;" id="trendLabel">↑ +0% за тиждень</span>
        </div>
        <div class="bar-chart" id="activityChart">
            <div class="bar" style="height: 40%;" data-label="Пн"></div>
            <div class="bar" style="height: 65%;" data-label="Вт"></div>
            <div class="bar" style="height: 50%;" data-label="Ср"></div>
            <div class="bar" style="height: 85%;" data-label="Чт"></div>
            <div class="bar" style="height: 70%;" data-label="Пт"></div>
            <div class="bar" style="height: 95%;" data-label="Сб"></div>
            <div class="bar" style="height: 80%;" data-label="Нд"></div>
        </div>
    </div>
</div>

<script>
    /**
     * НАЛАШТУВАННЯ ДЛЯ БЕКЕНД-РОЗРОБНИКА
     */
    const CONFIG = {
        USE_MOCK: true, // Змінити на false для роботи з реальним API
        API_BASE_URL: "http://localhost:3000/api", 
        ENDPOINTS: {
            STATS: "/admin/analytics",
            USERS: "/users",
            FOODS: "/foods"
        }
    };

    /**
     * ЛОГІКА ОТРИМАННЯ ДАНИХ (Data Layer)
     */
    async function fetchAnalyticsData() {
        if (CONFIG.USE_MOCK) {
            // Імітація запиту: беремо дані з localStorage або повертаємо дефолтні
            const mockUsers = JSON.parse(localStorage.getItem('users')) || [];
            const mockFoods = JSON.parse(localStorage.getItem('foods')) || [];
            
            return {
                userCount: mockUsers.length || 156,
                foodCount: mockFoods.length || 84,
                workoutCount: 42,
                activityRate: "87%",
                trend: "+12%"
            };
        } else {
            // Реальний запит до сервера
            try {
                const response = await fetch(`${CONFIG.API_BASE_URL}${CONFIG.ENDPOINTS.STATS}`);
                if (!response.ok) throw new Error("Помилка сервера");
                return await response.json();
            } catch (error) {
                console.error("Fetch error:", error);
                return null;
            }
        }
    }

    /**
     * ВІДОБРАЖЕННЯ ДАНИХ (UI Layer)
     */
    async function updateUI() {
        const data = await fetchAnalyticsData();
        
        if (!data) return;

        // Оновлення тексту
        document.getElementById('userCount').innerText = data.userCount;
        document.getElementById('foodCount').innerText = data.foodCount;
        document.getElementById('workoutCount').innerText = data.workoutCount;
        document.getElementById('activityRate').innerText = data.activityRate;
        document.getElementById('trendLabel').innerText = `↑ ${data.trend} за тиждень`;
        
        // Запуск анімації графіка
        animateBars();
    }

    function animateBars() {
        const bars = document.querySelectorAll('.bar');
        bars.forEach(bar => {
            const finalHeight = bar.style.height;
            bar.style.height = '0';
            setTimeout(() => {
                bar.style.height = finalHeight;
            }, 300);
        });
    }

    // Старт програми
    document.addEventListener('DOMContentLoaded', updateUI);
</script>

</body>
</html>
