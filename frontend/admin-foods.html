<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Керування базою | NutFit</title>
    <link href="https://fonts.googleapis.com/css2?family=Karantina:wght@300;400;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-color: #f5f0e6;
            --accent-blue: #0097C1;
            --table-header: #9fc7d6;
            --danger: #e74c3c;
            --white: #ffffff;
        }

        body {
            margin: 0;
            font-family: 'Segoe UI', sans-serif;
            background-color: var(--bg-color);
        }

        header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 20px 60px;
            background: var(--white);
            box-shadow: 0 2px 5px rgba(0,0,0,0.1);
        }

        .logo {
            font-family: 'Karantina', sans-serif;
            font-size: 42px;
            color: var(--accent-blue);
            font-weight: bold;
        }

        .container {
            width: 95%;
            max-width: 1100px;
            margin: 40px auto;
        }

        /* Таби */
        .tabs {
            display: flex;
            gap: 5px;
        }

        .tab-btn {
            padding: 12px 35px;
            background: #d1ccc0;
            border: none;
            cursor: pointer;
            font-family: 'Karantina', sans-serif;
            font-size: 24px;
            border-radius: 12px 12px 0 0;
            transition: 0.3s;
            color: #555;
        }

        .tab-btn.active {
            background: var(--white);
            color: var(--accent-blue);
            position: relative;
            z-index: 2;
        }

        /* Панель */
        .admin-panel {
            background: var(--white);
            padding: 35px;
            border-radius: 0 12px 12px 12px;
            box-shadow: 0 4px 20px rgba(0,0,0,0.08);
            margin-top: -1px; /* Щоб з'єднати з активним табом */
        }

        .form-group {
            display: flex;
            gap: 15px;
            margin-bottom: 35px;
            padding: 20px;
            background: #f9f9f9;
            border-radius: 8px;
        }

        input {
            flex: 2;
            padding: 12px;
            border: 1px solid #ddd;
            border-radius: 6px;
            font-size: 16px;
        }

        input[type="number"] { flex: 1; }

        .add-btn {
            background: var(--accent-blue);
            color: white;
            border: none;
            padding: 0 40px;
            border-radius: 6px;
            cursor: pointer;
            font-family: 'Karantina', sans-serif;
            font-size: 22px;
            transition: 0.3s;
        }

        .add-btn:hover { background: #007ba1; }

        /* Таблиця */
        table {
            width: 100%;
            border-collapse: collapse;
        }

        th, td {
            padding: 18px;
            text-align: left;
            border-bottom: 1px solid #eee;
        }

        th { 
            background: var(--table-header); 
            font-size: 13px; 
            text-transform: uppercase; 
            letter-spacing: 1px;
        }

        .delete-btn {
            color: var(--danger);
            border: 1px solid var(--danger);
            background: none;
            padding: 6px 12px;
            cursor: pointer;
            border-radius: 4px;
            font-size: 13px;
            transition: 0.3s;
        }

        .delete-btn:hover { background: var(--danger); color: white; }
    </style>
</head>
<body>

<header>
    <div class="logo">NutFit</div>
    <div style="font-family: 'Karantina'; font-size: 24px; color: #666;">ADMIN / DATABASE MANAGER</div>
</header>

<div class="container">
    
    <div class="tabs">
        <button id="btn-foods" class="tab-btn active" onclick="switchTab('foods')">СТРАВИ</button>
        <button id="btn-workouts" class="tab-btn" onclick="switchTab('workouts')">ТРЕНУВАННЯ</button>
    </div>

    <div class="admin-panel">
        <h2 id="view-title" style="font-family: 'Karantina'; font-size: 32px; margin-top: 0;">КЕРУВАННЯ СТРАВАМИ</h2>
        
        <div class="form-group">
            <input type="text" id="itemName" placeholder="Назва (напр. Грецький салат)">
            <input type="number" id="itemValue" placeholder="Значення">
            <button class="add-btn" onclick="handleAddItem()">ДОДАТИ</button>
        </div>

        <table>
            <thead>
                <tr>
                    <th style="width: 80px;">ID</th>
                    <th>Назва</th>
                    <th id="col-value">Значення</th>
                    <th style="width: 120px; text-align: center;">Дія</th>
                </tr>
            </thead>
            <tbody id="mainTableBody">
                </tbody>
        </table>
    </div>
</div>

<script>
/**
 * --- КОНФІГУРАЦІЯ ---
 */
const CONFIG = {
    USE_MOCK: true,
    API_BASE: "http://localhost:3000/api",
    ENDPOINTS: {
        foods: "/foods",
        workouts: "/workouts"
    }
};

let currentTab = 'foods';

/**
 * --- DATA SERVICE ---
 * Універсальний сервіс, який працює з активним табом
 */
const DataService = {
    async getAll() {
        if (CONFIG.USE_MOCK) {
            return JSON.parse(localStorage.getItem(currentTab)) || this.getInitialMockData();
        }
        const res = await fetch(CONFIG.API_BASE + CONFIG.ENDPOINTS[currentTab]);
        return await res.json();
    },

    async add(item) {
        if (CONFIG.USE_MOCK) {
            const data = await this.getAll();
            item.id = Date.now();
            data.push(item);
            localStorage.setItem(currentTab, JSON.stringify(data));
            return item;
        }
        const res = await fetch(CONFIG.API_BASE + CONFIG.ENDPOINTS[currentTab], {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify(item)
        });
        return await res.json();
    },

    async delete(id) {
        if (CONFIG.USE_MOCK) {
            let data = await this.getAll();
            data = data.filter(i => i.id !== id);
            localStorage.setItem(currentTab, JSON.stringify(data));
            return true;
        }
        await fetch(`${CONFIG.API_BASE}${CONFIG.ENDPOINTS[currentTab]}/${id}`, { method: "DELETE" });
    },

    getInitialMockData() {
        return currentTab === 'foods' 
            ? [{ id: 1, name: "Салат Цезар", val: 250 }, { id: 2, name: "Омлет", val: 180 }]
            : [{ id: 1, name: "Біг", val: 30 }, { id: 2, name: "Плавання", val: 45 }];
    }
};

/**
 * --- UI LOGIC ---
 */

async function switchTab(tab) {
    currentTab = tab;
    
    // Візуал табів
    document.getElementById('btn-foods').classList.toggle('active', tab === 'foods');
    document.getElementById('btn-workouts').classList.toggle('active', tab === 'workouts');

    // Тексти
    document.getElementById('view-title').innerText = tab === 'foods' ? 'КЕРУВАННЯ СТРАВАМИ' : 'КЕРУВАННЯ ТРЕНУВАННЯМИ';
    document.getElementById('itemValue').placeholder = tab === 'foods' ? 'Калорії (ккал)' : 'Тривалість (хв)';
    document.getElementById('col-value').innerText = tab === 'foods' ? 'Кал/порція' : 'Час (хв)';

    refresh();
}

async function refresh() {
    const data = await DataService.getAll();
    const body = document.getElementById('mainTableBody');
    body.innerHTML = '';

    data.forEach(item => {
        const unit = currentTab === 'foods' ? 'ккал' : 'хв';
        body.innerHTML += `
            <tr>
                <td>#${item.id}</td>
                <td><strong>${item.name}</strong></td>
                <td>${item.val} ${unit}</td>
                <td style="text-align: center;">
                    <button class="delete-btn" onclick="handleDeleteItem(${item.id})">Видалити</button>
                </td>
            </tr>
        `;
    });
}

async function handleAddItem() {
    const nameEl = document.getElementById('itemName');
    const valEl = document.getElementById('itemValue');

    if (!nameEl.value || !valEl.value) return alert("Заповніть всі поля!");

    await DataService.add({
        name: nameEl.value,
        val: Number(valEl.value)
    });

    nameEl.value = '';
    valEl.value = '';
    refresh();
}

async function handleDeleteItem(id) {
    if (confirm("Видалити цей запис?")) {
        await DataService.delete(id);
        refresh();
    }
}

// Початкове завантаження
document.addEventListener('DOMContentLoaded', refresh);
</script>

</body>
</html>
